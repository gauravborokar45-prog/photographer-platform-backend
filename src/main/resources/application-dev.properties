# ===========================================
# SERVER CONFIGURATION
# ===========================================
server.port=8080

# ===========================================
# DATABASE CONFIGURATION
# ===========================================
spring.datasource.url=jdbc:mysql://localhost:3306/photographer_platform
spring.datasource.username=root
spring.datasource.password=Gaurav@123

# ===========================================
# JPA / HIBERNATE CONFIGURATION
# ===========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===========================================
# JWT CONFIGURATION
# ===========================================

# Secret Key (Keep this secret in production)
jwt.secret=PhotographerPlatformSecureJWTSecretKeyForProduction2026ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890

# Access Token Expiration (24 Hours)
jwt.expiration=86400000

# ===========================================
# LOGGING
# ===========================================
logging.level.org.springframework.security=DEBUG